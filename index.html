<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta content="ie=edge" http-equiv="X-UA-Compatible" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Edward Paiva" />
  <meta name="description" content="Around the US page" />
  <meta name="keywords" content="HTML. CSS" />
  <title>Around the US</title>
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="stylesheet" href="./pages/index.css" />
</head>

<body class="page">
  <header class="header page__section">
    <img src="./images/logo.svg" alt="Around the U.S Logo" class="header__logo" />
  </header>
  <div class="page__content">
    <main class="content">
      <section class="profile">
        <img src="./images/jacques-cousteau.png" alt="Avatar" class="profile__image" />
        <div class="profile__info">
          <h1 class="profile__name">Jacques Cousteau</h1>
          <button class="profile__edit-button" id="profile-edit-button" type="button"></button>
          <p class="profile__title">Explorer</p>
        </div>
        <button class="profile__add-button" type="button"></button>
      </section>
      <section class="cards">
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&#169; 2022 Around The U.S.</p>
    </footer>
  </div>
  <div class="modal" id="profile-edit-modal">
    <div class="modal__container">
      <button class="modal__close-button" id="profile-edit-close-button" type="button"></button>
      <h2 class="modal__heading">Edit profile</h2>
      <form class="modal__form" id="profile-modal-form">
        <input type="text" name="name" class="modal__form-input" placeholder="Name" id="profile-name-input" />
        <input type="text" name="title" class="modal__form-input" placeholder="Description" id="profile-title-input" />
        <button class="modal__save-button" type="submit">Save</button>
      </form>
    </div>
  </div>

  <div class="modal" id="add-card-modal">
    <div class="modal__container">
      <button class="modal__close-button" id="add-card-modal-button-close" type="button"></button>
      <h2 class="modal__heading">New Place</h2>
      <form class="modal__form" id="add-card-form">
        <input type="text" name="title" class="modal__form-input modal__form-input_type_title" placeholder="Title"
          id="card-title-input" />
        <input type="text" name="url" class="modal__form-input modal__form-input_type_url" placeholder="Image URL"
          id="image-url-input" />
        <button class="modal__save-button" type="submit">Create</button>
      </form>
    </div>
  </div>

  <div class="modal" id="preview-image-modal">
    <div class="modal__container modal__container_preview-image">
      <div class="modal__image-wrapper">
        <button class="modal__close-button modal__close-button_preview-image" id="preview-image-close-button"></button>
        <img src="" alt="" class="modal__image" id="modal-image" />
        <h2 class="modal__preview-image-title" id="modal-preview-image-title"></h2>
      </div>
    </div>
  </div>

  <template id="card-template">
    <div class="card">
      <img src="" alt="" class="card__image" />
      <div class="card__text-container">
        <h2 class="card__title"></h2>
        <button class="card__like-button card__like-button_active" type="button"></button>
        <button class="card__delete-button card__delete-button_active" type="button"></button>
      </div>
    </div>
  </template>
  <script src="./scripts/index.js" defer></script>
</body>

</html>
